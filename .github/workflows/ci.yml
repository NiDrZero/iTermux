name: CI

# Minimal remote verification: prove the fork compiles and its unit tests pass
# on a clean runner, catching environment issues (especially JDK version) that
# do not surface on a local machine.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Compile and unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Android Gradle Plugin 8.11 supports JDK 17-21. Runners ship newer JDKs
      # by default, so pin 17 explicitly — this is the exact mismatch that fails
      # silently when relying on the runner default.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # compileSdk / targetSdk = 36 across modules.
      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # :app compilation transitively compiles :core. Unit tests cover the DS
      # mapper, lifecycle recorder, and the performance-baseline probe.
      - name: Compile and unit test
        run: ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
